services:
    postgres:
        image: pgvector/pgvector:pg16
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-vsl}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
            POSTGRES_DB: ${POSTGRES_DB:-mirrormind}
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER:-vsl} -d ${POSTGRES_DB:-mirrormind}",
                ]
            interval: 5s
            timeout: 5s
            retries: 5

    neo4j:
        image: neo4j:5-community
        restart: unless-stopped
        environment:
            NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
            NEO4J_PLUGINS: '["apoc"]'
        ports:
            - "7474:7474"
            - "7687:7687"
        volumes:
            - neo4jdata:/data
        healthcheck:
            test: ["CMD", "neo4j", "status"]
            interval: 10s
            timeout: 10s
            retries: 5

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        restart: unless-stopped
        env_file: .env
        ports:
            - "8000:8000"
        depends_on:
            postgres:
                condition: service_healthy
            neo4j:
                condition: service_healthy
        volumes:
            - ./backend:/app
        command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        restart: unless-stopped
        ports:
            - "5173:5173"
        depends_on:
            - backend
        volumes:
            - ./frontend:/app
            - /app/node_modules
        command: npm run dev -- --host

volumes:
    pgdata:
    neo4jdata:
