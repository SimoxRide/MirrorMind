services:
    postgres:
        image: pgvector/pgvector:pg16
        environment:
            POSTGRES_USER: vsl
            POSTGRES_PASSWORD: vsl_secret
            POSTGRES_DB: mirrormind
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U vsl -d mirrormind"]
            interval: 5s
            timeout: 5s
            retries: 5

    neo4j:
        image: neo4j:5-community
        environment:
            NEO4J_AUTH: neo4j/neo4j_secret
            NEO4J_PLUGINS: '["apoc"]'
        ports:
            - "7474:7474"
            - "7687:7687"
        volumes:
            - neo4jdata:/data
        healthcheck:
            test: ["CMD", "neo4j", "status"]
            interval: 10s
            timeout: 10s
            retries: 5

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        env_file: .env
        ports:
            - "8000:8000"
        depends_on:
            postgres:
                condition: service_healthy
            neo4j:
                condition: service_healthy
        volumes:
            - ./backend:/app
        command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        ports:
            - "5173:5173"
        depends_on:
            - backend
        volumes:
            - ./frontend:/app
            - /app/node_modules
        command: npm run dev -- --host

volumes:
    pgdata:
    neo4jdata:
